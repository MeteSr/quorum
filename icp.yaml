networks:
  - name: local
    mode: managed
    ii: true
    gateway:
      bind: 127.0.0.1
      port: 4943

  - name: testnet
    mode: connected
    url: https://ic0.app

  # ic is a reserved built-in network in icp-cli (https://icp-api.io) — do not redeclare it

environments:
  - name: local
    network: local

  - name: testnet
    network: testnet

  - name: ic
    network: ic
