name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Motoko compile check ───────────────────────────────────────────────────
  motoko-check:
    name: Motoko compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install icp-cli
        run: npm install -g @icp-sdk/icp-cli

      - name: Cache mops packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Install Motoko dependencies
        run: mops install

      - name: Initialize mops toolchain (downloads moc)
        run: mops toolchain init

      - name: Pre-warm moc binary
        run: |
          MOC_BIN=$(mops toolchain bin moc 2>/dev/null) || MOC_BIN=""
          if [ -z "$MOC_BIN" ]; then
            rm -rf .mops/_tmp && mops toolchain init
            MOC_BIN=$(mops toolchain bin moc)
          fi
          echo "moc: $MOC_BIN"
          "$MOC_BIN" --version

      - name: Install ic-wasm
        run: |
          TMP=$(mktemp -d)
          curl -sSfL --retry 3 --retry-delay 5 \
            https://github.com/dfinity/ic-wasm/releases/download/0.9.11/ic-wasm-x86_64-unknown-linux-musl.tar.xz \
            -o "$TMP/ic-wasm.tar.xz"
          tar -xJf "$TMP/ic-wasm.tar.xz" -C "$TMP"
          BIN=$(find "$TMP" -name "ic-wasm" -type f | head -1)
          sudo install -m 755 "$BIN" /usr/local/bin/ic-wasm
          rm -rf "$TMP"
          ic-wasm --version

      - name: Start local network (needed for canister ID allocation)
        run: icp network start -d

      - name: Compile all Motoko canisters
        run: |
          awk '/^canisters:/{p=1;next} /^[a-z]/{p=0} p && /^  - name:/{print $3}' icp.yaml \
            | grep -v "^frontend$" \
            | while read -r canister; do
              echo "=== $canister ==="
              icp build "$canister" || exit 1
            done

  # ── Backend: deploy + integration tests ──────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    needs: [motoko-check]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dfx
        # dfx handles cycle fabrication automatically on local replicas.
        # test-backend.sh calls dfx ping, so dfx must be the active replica.
        run: |
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/0.24.3/dfx-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          DFX_BIN=$(find . -name "dfx*" -type f -perm /111 | head -1)
          sudo install -m 755 "$DFX_BIN" /usr/local/bin/dfx
          dfx --version

      - name: Cache mops packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Install Motoko dependencies
        run: mops install

      - name: Initialize mops toolchain (downloads moc)
        run: |
          mops toolchain init
          MOC_BIN=$(mops toolchain bin moc 2>/dev/null) || MOC_BIN=""
          if [ -z "$MOC_BIN" ]; then
            rm -rf .mops/_tmp && mops toolchain init
            MOC_BIN=$(mops toolchain bin moc)
          fi
          "$MOC_BIN" --version

      - name: Start local replica
        run: dfx start --clean --background

      - name: Deploy canisters
        run: |
          for canister in members governance treasury documents announcements maintenance; do
            dfx deploy "$canister"
          done

      - name: Run backend tests
        run: bash scripts/test-backend.sh

  # ── Frontend: type check + unit tests + build ─────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # post coverage comment on PRs
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache npm store
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Unit tests with coverage
        run: cd frontend && npm run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 14

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: frontend/coverage/coverage-summary.json
          vite-config-path:  frontend/vite.config.ts

      - name: Build
        run: cd frontend && npm run build
