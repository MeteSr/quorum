name: Deploy Testnet

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testnet
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install icp-cli
        run: npm install -g @icp-sdk/icp-cli

      - name: Cache mops packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops
        run: npm install -g ic-mops

      - name: Install dfx
        run: |
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/0.24.3/dfx-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          DFX_BIN=$(find . -name "dfx*" -type f -perm /111 | head -1)
          sudo install -m 755 "$DFX_BIN" /usr/local/bin/dfx
          dfx --version

      - name: Wallet cycles pre-flight
        run: bash scripts/check-wallet-balance.sh
        env:
          DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}
          DFX_WALLET_ID: ${{ secrets.DFX_WALLET_ID }}
          DFX_NETWORK: ic
          MIN_WALLET_CYCLES: '5000000000000'

      - name: Deploy to testnet
        run: bash scripts/deploy.sh testnet
        env:
          DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}
          DFX_WALLET_ID: ${{ secrets.DFX_WALLET_ID }}
          BACKUP_CONTROLLER_PRINCIPAL: ${{ secrets.BACKUP_CONTROLLER_PRINCIPAL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Commit canister IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add canister_ids.json .icp/data/mappings/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "canister IDs unchanged, nothing to commit"
          else
            git commit -m "ops: update canister IDs after testnet deploy [skip ci]"
            git push || echo "⚠️  Push blocked by branch protection — commit canister_ids.json manually"
          fi
