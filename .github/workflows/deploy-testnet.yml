name: Deploy Testnet

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testnet
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Cache mops packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/mops
          key: mops-${{ runner.os }}-${{ hashFiles('mops.toml') }}

      - name: Install mops and Motoko dependencies
        run: |
          npm install -g ic-mops
          mops install
          mops toolchain init

      - name: Install dfx
        run: |
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/0.24.3/dfx-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          DFX_BIN=$(find . -name "dfx*" -type f -perm /111 | head -1)
          sudo install -m 755 "$DFX_BIN" /usr/local/bin/dfx
          dfx --version

      - name: Deploy to IC
        run: bash scripts/deploy.sh ic
        env:
          DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}

      - name: Commit canister IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add canister_ids.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "canister IDs unchanged, nothing to commit"
          else
            git commit -m "ops: update canister IDs after testnet deploy [skip ci]"
            git push || echo "⚠️  Push blocked by branch protection — commit canister_ids.json manually"
          fi
